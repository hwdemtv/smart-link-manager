  <body>
    <div id="root"></div>

    <script>
      // 全局错误诊断 - 捕获所有 JS 错误并在页面上显示 (移至底部以防阻塞渲染)
      window.onerror = function (msg, url, line, col, err) {
        var d = document.createElement("pre");
        d.style.cssText =
          "position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;padding:20px;font-size:14px;white-space:pre-wrap;max-height:50vh;overflow:auto;";
        d.textContent =
          "[JS ERROR] " +
          msg +
          "\n" +
          (url || "") +
          ":" +
          line +
          ":" +
          col +
          "\n" +
          ((err && err.stack) || "");
        document.body.appendChild(d);
      };
      window.addEventListener("unhandledrejection", function (e) {
        var d = document.createElement("pre");
        d.style.cssText =
          "position:fixed;top:0;left:0;right:0;z-index:99999;background:darkred;color:white;padding:20px;font-size:14px;white-space:pre-wrap;max-height:50vh;overflow:auto;";
        d.textContent =
          "[PROMISE ERROR] " +
          ((e.reason && e.reason.stack) || e.reason || "Unknown");
        document.body.appendChild(d);
      });
      console.log("[DIAG] Error handler installed at bottom.");
    </script>
    <!-- Analytics disabled - configure VITE_ANALYTICS_ENDPOINT and VITE_ANALYTICS_WEBSITE_ID to enable -->
