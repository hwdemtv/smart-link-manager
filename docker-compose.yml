version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: smart-link-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: smart_link
      MYSQL_USER: smartlink
      MYSQL_PASSWORD: smartlink123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: smart-link-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://smartlink:smartlink123@mysql:3306/smart_link
      JWT_SECRET: your-jwt-secret-change-this
      VITE_APP_ID: smart-link-manager
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./:/app

volumes:
  mysql_data:
